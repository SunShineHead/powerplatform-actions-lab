name: export-and-branch-solution

# Export solution from DEV environment, unpack it, and prepare a git branch with the changes
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  export-from-dev:
    name: Export and Branch Solution
    runs-on: windows-latest
    
    env:
      SOLUTION_NAME: ALMLab
      EXPORT_PATH: out/exported
      SOLUTION_PATH: out/solutions

    steps:
      # Checkout repository with LFS support for large files
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0

      # Authenticate and verify access to Power Platform environment
      - name: Authenticate to Power Platform
        uses: microsoft/powerplatform-actions/who-am-i@v1
        with:
          environment-url: ${{ secrets.POWERPLATFORM_ENVIRONMENT_URL }}
          app-id: ${{ secrets.POWERPLATFORM_APP_ID }}
          client-secret: ${{ secrets.POWERPLATFORM_CLIENT_SECRET }}
          tenant-id: ${{ secrets.POWERPLATFORM_TENANT_ID }}

      # Export solution from DEV environment
      - name: Export solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.POWERPLATFORM_ENVIRONMENT_URL }}
          app-id: ${{ secrets.POWERPLATFORM_APP_ID }}
          client-secret: ${{ secrets.POWERPLATFORM_CLIENT_SECRET }}
          tenant-id: ${{ secrets.POWERPLATFORM_TENANT_ID }}
          solution-name: ${{ env.SOLUTION_NAME }}
          solution-output-file: ${{ env.EXPORT_PATH }}/${{ env.SOLUTION_NAME }}.zip
          managed: false

      # Unpack solution for git version control
      - name: Unpack solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: ${{ env.EXPORT_PATH }}/${{ env.SOLUTION_NAME }}.zip
          solution-folder: ${{ env.SOLUTION_PATH }}/${{ env.SOLUTION_NAME }}
          solution-type: 'Unmanaged'
          overwrite-files: true

      # Create branch and prepare for pull request
      - name: Create branch and commit changes
        uses: microsoft/powerplatform-actions/branch-solution@v1
        with:
          solution-folder: ${{ env.SOLUTION_PATH }}/${{ env.SOLUTION_NAME }}
          solution-target-folder: solutions/${{ env.SOLUTION_NAME }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          allow-empty-commit: true
